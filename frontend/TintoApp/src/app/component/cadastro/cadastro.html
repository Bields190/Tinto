<section class="cadastro-container">
  <div class="logo-tinto">
    <img src="assets/img/Tinto - Areia.png" alt="Logo Tinto" />
  </div>

  <div class="forms">
    <h1 class="titulo-forms">CADASTRO</h1>

    <form class="forms-itens" [formGroup]="cadastroForm" (ngSubmit)="onSubmit()">
      <div class="campo-grupo">
        <label for="nome" class="label-campo">Nome</label>
        <input
          id="nome"
          type="text"
          formControlName="nome"
          class="input-padrao"
          placeholder="Digite seu nome..."
        />
      </div>

      <div class="campo-grupo">
        <label for="dataNascimento" class="label-campo">Data de Nascimento</label>
        <input
          id="dataNascimento"
          type="date"
          formControlName="dataNascimento"
          class="input-padrao"
        />
      </div>

      <div class="campo-grupo">
        <label for="email" class="label-campo">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="input-padrao"
          placeholder="Digite seu email..."
        />
      </div>

      <div class="campo-grupo">
        <label for="senha" class="label-campo">Senha</label>
        <input
          id="senha"
          type="password"
          formControlName="senha"
          class="input-padrao"
          placeholder="Digite sua senha..."
        />
      </div>

      <div class="campo-grupo">
        <label for="confirmarSenha" class="label-campo">Confirme sua senha</label>
        <input
          id="confirmarSenha"
          type="password"
          formControlName="confirmarSenha"
          class="input-padrao"
          placeholder="Confirme sua senha..."
        />
        <span
          *ngIf="cadastroForm.hasError('mismatch') && cadastroForm.get('confirmarSenha')?.touched"
          style="color: rgb(255, 255, 255); font-size: 12px"
        >
          As senhas não coincidem.
        </span>
      </div>

      <button type="submit" class="botao-padrao botao-cadastrar" [disabled]="cadastroForm.invalid">
        CADASTRE-SE
      </button>

      <div class="texto-login">
        <a routerLink="/login" class="link-login">Já possui cadastro? Faça seu Log-In</a>
      </div>
    </form>
  </div>
</section>
