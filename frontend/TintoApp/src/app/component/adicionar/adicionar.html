<section class="cadastro-container">
  <div class="logo-tinto">
    <img src="assets/img/Tinto - Areia.png" alt="Logo Tinto" />
  </div>

  <div class="doisblocos">
    <div class="forms">
      <h1 class="titulo-forms">DADOS BÁSICOS</h1>

      <form [formGroup]="form" class="forms-itens">
        <div class="campo-grupo">
          <label for="nomeVinho" class="label-campo">Nome do Vinho:</label>
          <input
            id="nomeVinho"
            type="text"
            formControlName="nomeVinho"
            class="input-padrao"
            placeholder="Digite o nome do vinho..."
          />
        </div>
        <div class="campo-grupo">
          <label for="vinicola" class="label-campo">Vinícola:</label>
          <input
            id="vinicola"
            type="text"
            formControlName="vinicola"
            class="input-padrao"
            placeholder="Digite a vinícola..."
          />
        </div>
        <div class="campo-grupo">
          <label for="uva" class="label-campo">Tipo de Uva:</label>
          <input
            id="uva"
            type="text"
            formControlName="uva"
            class="input-padrao"
            placeholder="Digite o tipo de uva..."
          />
        </div>
        <div class="campo-grupo">
          <label for="pais" class="label-campo">País:</label>
          <input
            id="pais"
            type="text"
            formControlName="pais"
            class="input-padrao"
            placeholder="Digite o país de origem..."
          />
        </div>
        <div class="campo-grupo">
          <label for="teorAlcoolico" class="label-campo">Teor Alcoólico:</label>
          <div class="slider-wrapper">
            <input
              id="teorAlcoolico"
              type="range"
              min="0"
              max="35"
              step="1"
              formControlName="teorAlcoolico"
              class="input-padrao"
            />
            <div class="slider-value">{{ form.get('teorAlcoolico')?.value }}%</div>
          </div>
        </div>
        <div class="campo-grupo">
          <label for="dataConsumo" class="label-campo">Data de Consumo:</label>
          <input id="dataConsumo" type="date" formControlName="dataConsumo" class="input-padrao" />
        </div>
        <div class="campo-grupo">
          <label for="harmonizacao" class="label-campo">Harmonização:</label>
          <input
            id="harmonizacao"
            type="text"
            formControlName="harmonizacao"
            class="input-padrao"
            placeholder="Digite o que harmoniza com o vinho..."
          />
        </div>
      </form>
    </div>
    <div class="forms">
      <h1 class="titulo-forms">AVALIAÇÃO E FOTOS</h1>

      <form [formGroup]="form" class="forms-itens">
        <div class="campo-grupo avaliacao">
          <label class="label-campo">Avaliação:</label>
          <div class="stars" (mouseleave)="clearHover()">
            <button
              type="button"
              class="star"
              *ngFor="let star of [1, 2, 3, 4, 5]"
              (mouseenter)="setHover(star)"
              (click)="setRating(star)"
              [class.filled]="star <= (hoverRating || rating)"
              aria-label="Avaliar {{ star }} estrelas"
            >
              ★
            </button>
          </div>
        </div>

        <div class="campo-grupo comentarios">
          <label class="label-campo">Comentários:</label>
          <textarea
            class="input-padrao comentario-textarea"
            formControlName="comments"
            placeholder="Deixe seus comentários pessoais sobre o vinho..."
          ></textarea>
        </div>

        <div class="campo-grupo fotos">
          <label class="label-campo">Adicionar Foto:</label>
          <div class="photo-grid">
            <div
              class="photo-slot"
              *ngFor="let slot of photos; let i = index"
              (click)="triggerFileInput(i)"
            >
              <input
                #fileInput
                type="file"
                accept="image/*"
                hidden
                (change)="onFileSelected($event, i)"
              />

              <ng-container *ngIf="slot.url; else placeholder">
                <img [src]="slot.url" alt="Foto {{ i + 1 }}" />
              </ng-container>
              <ng-template #placeholder>
                <span class="plus">+</span>
              </ng-template>
            </div>
          </div>
        </div>

        <div class="botoes-grupo">
          <button type="button" class="botao-padrao botao-cadastrar" (click)="salvarVinho()">
            SALVAR VINHO
          </button>
        </div>
      </form>
    </div>
  </div>
</section>
