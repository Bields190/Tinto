<section class="login-container">
  <div class="logo-tinto">
    <img src="assets/img/Tinto - Areia.png" alt="Logo Tinto">
  </div>

  <div class="forms">
    <h1 class="titulo-forms">LOG IN</h1>

    <form class="forms-itens" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="campo-grupo">
        <label for="email" class="label-campo">Email</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          class="input-padrao"
          placeholder="Digite seu email..."
        />
      </div>

      <div class="campo-grupo">
        <label for="senha" class="label-campo">Senha</label>
        <input
          id="senha"
          type="password"
          formControlName="senha"
          class="input-padrao"
          placeholder="Digite sua senha..."
        />
      </div>

      <a class="esqueci-senha" href="#" (click)="abrirModalEsqueciSenha($event)">Esqueci minha senha</a>

      <button type="submit" [disabled]="loginForm.invalid" class="botao-padrao botao-cadastrar">ENTRE</button>
    </form>

    <div class="texto-login">
      <a routerLink="/cadastro" class="link-login">Não possui cadastro? Cadastre-se</a>
    </div>
  </div>

  <section *ngIf="showEsqueciSenhaModal" class="modal-overlay">
    <div class="modal-content">
      <h2>Recuperar senha</h2>

      <ng-container *ngIf="etapaEsqueciSenha === 1">
        <p>Informe o e-mail cadastrado para receber o código.</p>
        <div class="campo-grupo">
          <input
            type="email"
            [(ngModel)]="esqueceuEmail"
            placeholder="Digite seu email"
            class="input-padrao"
          />
        </div>
        <div class="erro-senha" *ngIf="erroEsqueciSenha">{{ erroEsqueciSenha }}</div>
        <div class="botoes-grupo">
          <button type="button" class="botao-padrao" (click)="enviarEmailParaRedefinicao()">Enviar</button>
          <button type="button" class="botao-padrao" (click)="fecharModalEsqueciSenha()">Cancelar</button>
        </div>
      </ng-container>

      <ng-container *ngIf="etapaEsqueciSenha === 2">
        <p>Digite o código enviado para {{ emailDeVerificacao }}.</p>
        <div class="campo-grupo">
          <input
            type="text"
            [(ngModel)]="codigo"
            placeholder="Código de 6 dígitos"
            class="input-padrao"
          />
        </div>
        <div class="erro-senha" *ngIf="erroEsqueciSenha">{{ erroEsqueciSenha }}</div>
        <div class="botoes-grupo">
          <button type="button" class="botao-padrao" (click)="verificarCodigoEsqueciSenha()">Confirmar</button>
          <button type="button" class="botao-padrao" (click)="fecharModalEsqueciSenha()">Cancelar</button>
        </div>
      </ng-container>
    </div>
  </section>
</section>
