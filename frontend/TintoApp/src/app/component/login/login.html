<section class="login-container">
  <div class="logo-tinto">
    <img src="assets/img/Tinto - Areia.png" alt="Logo Tinto">
  </div>

	<div class="forms">
		<h1 class="titulo-forms">LOG IN</h1>

		<form class="forms-itens">
			<div class="campo-grupo">
        		<label for="email" class="label-campo">Email</label>
        		<input
          			id="email"
          			type="email"
          			class="input-padrao"
          			placeholder="Digite seu email..."
          			required
       			/>
      		</div>

      		<div class="campo-grupo">
				<label for="senha" class="label-campo">Senha</label>
				<input
					id="senha"
					type="password"
					class="input-padrao"
					placeholder="Digite sua senha..."
					required
				/>
      		</div>

			<a class="esqueci-senha" href="#">Esqueci minha senha</a>

			<button type="submit" class="botao-padrao botao-cadastrar">ENTRE</button>
		</form>

		<div class="texto-login">
        	<a href="/cadastro" class="link-login">Já possui cadastro? Faça seu Log-In</a>
      	</div>
	</div>
</section>
